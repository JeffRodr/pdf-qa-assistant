# Proxy inverso nginx -> gunicorn (127.0.0.1:8000)
# Reemplazá server_name y las rutas del certificado por las tuyas.
# Para un certificado autofirmado rápido:
#   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/pdf-qa.key -out /etc/nginx/ssl/pdf-qa.crt

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/pdf-qa.crt;
    ssl_certificate_key /etc/nginx/ssl/pdf-qa.key;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
